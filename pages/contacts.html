<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/contact.css">
</head>

<body>
    <header>
        <section class="navbar">
            <p>KOCHI</p>
            <div class="Navigation_linkes">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="contacts.html">Contact</a></li>
                </ul>
            </div>
        </section>
        <section class="Hero_Section">
            <div class="Hero_Section_img">
                <div class="Hero_Section_content">
                    <h1>CONTACT US</h1>
                </div>
            </div>
        </section>
        <section class="contact">
            <div class="Contact_Details">
                <h3>Contact Details</h3>
                <p>contact@kochi.com<br>(555) 555-5555</p>
                <address>
                    Central HQ <br>
                    123 Avenue Street <br>
                    City Township, CA 12345
                </address>
            </div>
            <div class="Online_Inquiry">
                <h3>Online_Inquiry</h3>
                <div class="name">
                <label for="Name">Name</label>
                <input type="text" id="Name" placeholder="e.g. John Smith">
                </div>
                <div class="email">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="e.g. name@domain.tld">
                </div>
                <div class="message">
                <label for="Message">Message</label>
                <textarea name="message" id="Message" rows="5" placeholder="Type your message here (between 20 
and 500 characters)"></textarea>
                </div>
                <div class="buttons">
                    <button class="submit">SUBMIT</button>
                    <button class="reset">RESET</button>
                </div>
            </div>
        </section>

    </header>
</body>

</html>
